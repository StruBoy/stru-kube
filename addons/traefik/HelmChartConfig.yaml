# UNUSED — kept for reference only.
#
# This repo originally assumed Traefik was the default ingress controller
# (true on K3s, NOT on RKE2). RKE2 actually ships `rke2-ingress-nginx` as
# a DaemonSet on hostPort 80/443, so this HelmChartConfig is never applied.
#
# To swap nginx for Traefik you would need to:
#   1. Add `disable: [rke2-ingress-nginx]` to /etc/rancher/rke2/config.yaml on every CP
#   2. Install the Traefik chart yourself (RKE2 does not bundle it)
#   3. Manage Traefik CRDs (IngressRoute, Middleware, etc.) separately
#   4. Rewrite addons/longhorn/ingress.yaml to use traefik.io/v1alpha1.IngressRoute
#
# Not recommended for a homelab; nginx is already running and working.
#
---
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: rke2-traefik
  namespace: kube-system
spec:
  valuesContent: |-
    service:
      type: LoadBalancer
      annotations:
        metallb.universe.tf/address-pool: default-pool
    ports:
      web:
        redirectTo:
          port: websecure
          priority: 10
      websecure:
        tls:
          enabled: true
    providers:
      kubernetesCRD:
        allowCrossNamespace: true
    ingressRoute:
      dashboard:
        enabled: false
