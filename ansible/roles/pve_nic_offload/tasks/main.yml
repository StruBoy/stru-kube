---
# Disable GSO/TSO on physical NICs of a Proxmox hypervisor host via a
# systemd oneshot service. The service is independent of systemd .link
# matching, so it cannot shadow boot-time interface rename rules — this
# is the lesson from the earlier `.link`-based version, which broke the
# host's eno2 → nic0 rename and left vmbr0 with no slave at reboot.
#
# `become: true` is set at the playbook level.

- name: Confirm we're on a PVE node
  ansible.builtin.command: pveversion
  changed_when: false

- name: Ensure ethtool is installed
  ansible.builtin.apt:
    name: ethtool
    state: present
    update_cache: false

- name: Discover physical NICs matching '{{ pve_nic_offload_match }}'
  ansible.builtin.shell: |
    set -eu
    for iface in $(ls /sys/class/net); do
      case "$iface" in
        {{ pve_nic_offload_match | replace(' ', '|') }}) echo "$iface" ;;
      esac
    done
  args:
    executable: /bin/bash
  register: pve_nic_offload_ifaces_raw
  changed_when: false

- name: Fail if no physical NICs matched (check pve_nic_offload_match)
  ansible.builtin.assert:
    that:
      - pve_nic_offload_ifaces_raw.stdout_lines | length > 0
    fail_msg: >-
      No interfaces in /sys/class/net matched globs '{{ pve_nic_offload_match }}'.
      Inspect `ls /sys/class/net` on the host and update pve_nic_offload_match.

# Migration: the prior role version dropped a .link file that shadowed
# the host's eno2 → nic0 rename rule, breaking networking on reboot.
# Remove it. The running interface name doesn't change here; the rename
# rule only re-fires on the next boot, which is the host's natural
# recovery point.
- name: Remove obsolete .link file from prior role version
  ansible.builtin.file:
    path: "{{ pve_nic_offload_legacy_link_path }}"
    state: absent
  notify: reload udev

- name: Render systemd oneshot unit at {{ pve_nic_offload_service_path }}
  ansible.builtin.template:
    src: nic-offload.service.j2
    dest: "{{ pve_nic_offload_service_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: reload systemd

- name: Flush handlers so daemon-reload happens before enable/start
  ansible.builtin.meta: flush_handlers

# `state: started` on a Type=oneshot service fires its ExecStart, which is
# the immediate-apply path. `enabled: true` adds it to multi-user.target
# so it fires automatically at every boot.
- name: Enable and start {{ pve_nic_offload_service_name }}
  ansible.builtin.systemd:
    name: "{{ pve_nic_offload_service_name }}"
    enabled: true
    state: started

- name: Verify GSO and TSO are off on each matched NIC
  ansible.builtin.shell: |
    set -eu
    out=$(ethtool -k {{ item }})
    echo "$out" | grep -qE '^generic-segmentation-offload: off$' \
      || { echo "GSO not off on {{ item }}:"; echo "$out" | grep -E '^generic-segmentation-offload'; exit 1; }
    echo "$out" | grep -qE '^tcp-segmentation-offload: off$' \
      || { echo "TSO not off on {{ item }}:"; echo "$out" | grep -E '^tcp-segmentation-offload'; exit 1; }
    echo "{{ item }}: GSO and TSO both off"
  args:
    executable: /bin/bash
  loop: "{{ pve_nic_offload_ifaces_raw.stdout_lines }}"
  changed_when: false
