---
- name: Ensure /etc/rancher/rke2 exists
  ansible.builtin.file:
    path: /etc/rancher/rke2
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Render RKE2 agent config
  ansible.builtin.template:
    src: config.yaml.j2
    dest: /etc/rancher/rke2/config.yaml
    owner: root
    group: root
    mode: "0600"

- name: Install RKE2 (agent)
  ansible.builtin.shell:
    cmd: "curl -sfL {{ rke2_install_url }} | INSTALL_RKE2_TYPE=agent INSTALL_RKE2_CHANNEL={{ rke2_channel }} {{ ('INSTALL_RKE2_VERSION=' ~ rke2_version) if rke2_version | length > 0 else '' }} sh -"
    creates: /usr/local/bin/rke2

- name: Enable and start rke2-agent
  ansible.builtin.systemd:
    name: rke2-agent
    enabled: true
    state: started
    daemon_reload: true
