---
# One-time Proxmox host setup:
#   - pve_bootstrap:    TerraformProv role, terraform@pve user + ACL,
#                       Snippets on `local` storage, node-name validation.
#   - pve_nic_offload:  installs a systemd oneshot that runs
#                       `ethtool -K ... gso off tso off` after network.target,
#                       disabling hardware segmentation offload on physical
#                       NICs at every boot. Mitigation for NIC drivers that
#                       wedge under load; see docs/troubleshooting.md
#                       (stru-prox0 incident).
#
# Idempotent — safe to re-run.
#
# Usage:
#   cp ansible/inventory/pve-hosts.ini.example ansible/inventory/pve-hosts.ini
#   $EDITOR ansible/inventory/pve-hosts.ini      # adjust host names + IPs
#   make bootstrap-pve

- name: Bootstrap Proxmox hosts (provisioner account, snippets, NIC offload tuning)
  hosts: proxmox_hosts
  become: true
  gather_facts: false
  roles:
    - role: pve_bootstrap
      tags: [pve-bootstrap]
    - role: pve_nic_offload
      tags: [pve-nic-offload]
