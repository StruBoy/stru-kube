---
# Fail fast if RKE2_TOKEN didn't make it into the environment. Otherwise the
# config template renders `token:` empty, every CP fails to join, and the failure
# only shows up 5 minutes later in `systemctl status rke2-server`.
- name: Validate required env vars before touching any host
  hosts: localhost
  gather_facts: false
  become: false
  tasks:
    - name: Assert RKE2_TOKEN is set
      ansible.builtin.assert:
        that:
          - rke2_token is defined
          - rke2_token | length > 0
        fail_msg: |
          RKE2_TOKEN env var is empty. Source .env first:
            set -a; source .env; set +a
          Or use `make configure`, which auto-sources .env.
      tags: [always]

- name: Base OS prep on all cluster nodes
  hosts: rke2_cluster
  become: true
  gather_facts: true
  roles:
    - role: common
      tags: [common]

- name: Longhorn prerequisites on worker nodes
  hosts: rke2_agents
  become: true
  roles:
    - role: longhorn_prereqs
      tags: [longhorn-prereqs]

- name: Drop kube-vip static-pod manifest on control plane (before RKE2 starts)
  hosts: rke2_servers
  become: true
  roles:
    - role: kube_vip
      tags: [kube-vip]

- name: Bootstrap first RKE2 server
  hosts: rke2_first
  become: true
  roles:
    - role: rke2_server
      tags: [rke2-server, rke2-bootstrap]

- name: Wait for API VIP before joining remaining servers
  hosts: rke2_first
  become: false
  gather_facts: false
  tasks:
    # A bare TCP-port check returns true as soon as the socket accepts, which
    # happens before the API is actually serving requests — and that's how cp2/cp3
    # used to race kube-vip and fail to join. Probe /livez instead: 200 means RKE2
    # is healthy; 401 means TLS is up and the API is serving (auth not provided).
    # Either is good enough to start the next join.
    - name: Wait for API VIP to serve /livez (kube-vip claimed + RKE2 healthy)
      ansible.builtin.uri:
        url: "https://{{ rke2_api_vip }}:6443/livez"
        validate_certs: false
        status_code: [200, 401]
      register: vip_live
      until: vip_live.status in [200, 401]
      retries: 60
      delay: 5
      delegate_to: localhost
      tags: [kube-vip, rke2-server]

- name: Join remaining RKE2 servers
  hosts: rke2_servers:!rke2_first
  become: true
  serial: 1
  roles:
    - role: rke2_server
      tags: [rke2-server]

- name: Install RKE2 agents (workers)
  hosts: rke2_agents
  become: true
  roles:
    - role: rke2_agent
      tags: [rke2-agent]

- name: Post-install (fetch kubeconfig, label nodes)
  hosts: rke2_first
  become: true
  roles:
    - role: post_install
      tags: [post-install]
