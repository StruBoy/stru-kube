---
- name: Install cluster addons (MetalLB, Longhorn) — ingress uses bundled rke2-ingress-nginx
  hosts: rke2_first
  become: false
  gather_facts: false
  vars:
    kubeconfig: "{{ rke2_kubeconfig_local }}"

  tasks:
    # --- MetalLB ---
    - name: Create metallb-system namespace
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: metallb-system
            labels:
              pod-security.kubernetes.io/enforce: privileged
              pod-security.kubernetes.io/audit: privileged
              pod-security.kubernetes.io/warn: privileged
      delegate_to: localhost
      tags: [metallb]

    - name: Add MetalLB Helm repo
      kubernetes.core.helm_repository:
        name: metallb
        repo_url: https://metallb.github.io/metallb
      delegate_to: localhost
      tags: [metallb]

    - name: Install MetalLB chart
      kubernetes.core.helm:
        kubeconfig: "{{ kubeconfig }}"
        name: metallb
        chart_ref: metallb/metallb
        chart_version: "{{ metallb_chart_version }}"
        release_namespace: metallb-system
        wait: true
        wait_timeout: 5m
        values_files:
          - "{{ playbook_dir }}/../addons/metallb/values.yaml"
      delegate_to: localhost
      tags: [metallb]

    - name: Wait for MetalLB CRDs to be established
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig }}"
        api_version: apiextensions.k8s.io/v1
        kind: CustomResourceDefinition
        name: ipaddresspools.metallb.io
      register: metallb_crd
      until: metallb_crd.resources | length > 0
      retries: 30
      delay: 5
      delegate_to: localhost
      tags: [metallb]

    - name: Apply MetalLB IPAddressPool + L2Advertisement
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        src: "{{ playbook_dir }}/../addons/metallb/pool.yaml"
      delegate_to: localhost
      tags: [metallb]

    # NOTE: RKE2 ships rke2-ingress-nginx (not Traefik); the bundled controller
    # runs as a DaemonSet with hostPort 80/443, so no LoadBalancer service is
    # needed for ingress. MetalLB's pool stays available for app LB services.

    # --- Longhorn ---
    - name: Create longhorn-system namespace
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: longhorn-system
      delegate_to: localhost
      tags: [longhorn]

    - name: Add Longhorn Helm repo
      kubernetes.core.helm_repository:
        name: longhorn
        repo_url: https://charts.longhorn.io
      delegate_to: localhost
      tags: [longhorn]

    - name: Install Longhorn chart
      kubernetes.core.helm:
        kubeconfig: "{{ kubeconfig }}"
        name: longhorn
        chart_ref: longhorn/longhorn
        chart_version: "{{ longhorn_chart_version }}"
        release_namespace: longhorn-system
        wait: true
        wait_timeout: 10m
        values_files:
          - "{{ playbook_dir }}/../addons/longhorn/values.yaml"
      delegate_to: localhost
      tags: [longhorn]

    - name: Generate htpasswd for Longhorn UI (nginx ingress basic-auth format)
      ansible.builtin.shell: |
        printf "%s:%s\n" "{{ longhorn_ui_user }}" "$(openssl passwd -apr1 '{{ longhorn_ui_pass }}')"
      register: longhorn_htpasswd
      changed_when: false
      no_log: true
      delegate_to: localhost
      tags: [longhorn]

    - name: Create Longhorn UI basic-auth Secret (nginx expects key 'auth')
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: longhorn-ui-auth
            namespace: longhorn-system
          type: Opaque
          stringData:
            auth: "{{ longhorn_htpasswd.stdout }}"
      delegate_to: localhost
      no_log: true
      tags: [longhorn]

    - name: Apply Longhorn UI ingress + middleware
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        template: "{{ playbook_dir }}/../addons/longhorn/ingress.yaml"
      delegate_to: localhost
      tags: [longhorn]
